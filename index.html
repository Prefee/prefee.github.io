---
layout: landing
---

<!-- Projects -->
<section class="px-3 py-4" id="projects">
  <h2 class="mb-4">{{ site.data.locales[site.lang].projects | default: 'Projects' }}</h2>
  <div class="row g-4">
    {% for p in site.data.projects %}
    <div class="col-12 col-md-6">
      <a href="{{ p.link | default: '#' }}" class="card project-card h-100 text-decoration-none">
        <div class="card-body d-flex flex-column">
          <div class="d-flex align-items-center mb-2">
            <i class="fas fa-cube fa-fw me-2" style="color: var(--link-color)"></i>
            <h3 class="card-title mb-0">{{ p.name }}</h3>
          </div>
          <p class="card-text text-muted flex-grow-1">{{ p.desc }}</p>
          {% if p.tags %}
          <div class="mt-2">
            {% for t in p.tags %}<span class="badge text-secondary border me-1 mb-1">{{ t }}</span>{% endfor %}
          </div>
          {% endif %}
        </div>
      </a>
    </div>
    {% else %}
    <p class="text-muted">尚未添加项目。请在 <code>_data/projects.yml</code> 中填写。</p>
    {% endfor %}
  </div>
</section>

<style>
  .project-card {
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .project-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  }
</style>
